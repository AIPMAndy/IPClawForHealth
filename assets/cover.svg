  </text>

  <rect x="220" y="628" width="1130" height="96" rx="28" fill="#0F221E" fill-opacity="0.9" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <text x="258" y="684" fill="url(#accent)" font-family="Arial, sans-serif" font-size="30" font-weight="700">
    从内容灵感到成交动作，一套仓库把关键资产整理清楚。
  </text>
