<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="180" y1="90" x2="1450" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1715"/>
      <stop offset="1" stop-color="#09100F"/>
    </linearGradient>
    <linearGradient id="panel" x1="240" y1="170" x2="1320" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102421" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0D1B19" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="accent" x1="390" y1="310" x2="1150" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38C19D"/>
      <stop offset="1" stop-color="#82E2E0"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="48" fill="url(#bg)"/>
  <circle cx="1260" cy="180" r="150" fill="#38C19D" fill-opacity="0.15" filter="url(#glow)"/>
  <circle cx="260" cy="720" r="140" fill="#5AD7FF" fill-opacity="0.12" filter="url(#glow)"/>

  <rect x="140" y="120" width="1320" height="660" rx="36" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.12"/>

  <text x="220" y="238" fill="#7EDFC3" font-family="Arial, sans-serif" font-size="26" font-weight="700">
    OPEN-SOURCE HEALTH FOUNDER IP KIT
  </text>
  <text x="220" y="318" fill="#F0FBF7" font-family="Arial, sans-serif" font-size="68" font-weight="700">
    IPClawForHealth
  </text>
  <text x="220" y="380" fill="#AFCCC4" font-family="Arial, sans-serif" font-size="30" font-weight="500">
    给大健康行业创始人的口播 IP 内容工具箱
  </text>
  <text x="220" y="432" fill="#C7DED7" font-family="Arial, sans-serif" font-size="24" font-weight="400">
    定位 Prompt / 选题库 / 脚本模板 / 成交话术 / 变现设计 / 工作流 / CLI 工具
  </text>

  <rect x="220" y="490" width="260" height="90" rx="24" fill="#132B27" stroke="#7EDFC3" stroke-opacity="0.22"/>
  <text x="252" y="532" fill="#DFFAF0" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    5 个核心 Prompt
  </text>
  <text x="252" y="564" fill="#93B8AE" font-family="Arial, sans-serif" font-size="18">
    定位、选题、脚本、话术、变现
  </text>

  <rect x="510" y="490" width="260" height="90" rx="24" fill="#132B27" stroke="#7EDFC3" stroke-opacity="0.22"/>
  <text x="542" y="532" fill="#DFFAF0" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    2 套工作流
  </text>
  <text x="542" y="564" fill="#93B8AE" font-family="Arial, sans-serif" font-size="18">
    30 分钟出片 / 30 天打造
  </text>

  <rect x="800" y="490" width="260" height="90" rx="24" fill="#132B27" stroke="#7EDFC3" stroke-opacity="0.22"/>
  <text x="832" y="532" fill="#DFFAF0" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    3 个 Python 工具
  </text>
  <text x="832" y="564" fill="#93B8AE" font-family="Arial, sans-serif" font-size="18">
    选题生成 / Prompt 生成 / 脚本优化
  </text>

  <rect x="1090" y="490" width="260" height="90" rx="24" fill="#132B27" stroke="#7EDFC3" stroke-opacity="0.22"/>
  <text x="1122" y="532" fill="#DFFAF0" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    1 个落地页
  </text>
  <text x="1122" y="564" fill="#93B8AE" font-family="Arial, sans-serif" font-size="18">
